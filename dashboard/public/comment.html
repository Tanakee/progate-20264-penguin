<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>コメント投稿</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #030712; color: #fff; font-family: -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100dvh; padding: 16px;
  }
  .container { width: 100%; max-width: 360px; }
  .header { text-align: center; margin-bottom: 24px; }
  .header .icon { font-size: 48px; }
  .header h1 { font-size: 20px; margin-top: 8px; }
  .header p { font-size: 13px; color: #9ca3af; margin-top: 4px; }
  input {
    width: 100%; padding: 14px 16px; font-size: 18px;
    background: #1f2937; border: 1px solid #374151; border-radius: 12px;
    color: #fff; outline: none; margin-bottom: 16px;
  }
  input:focus { border-color: #3b82f6; }
  .colors { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
  .colors button {
    width: 40px; height: 40px; border-radius: 50%; border: 2px solid #4b5563;
    cursor: pointer; transition: transform 0.15s;
  }
  .colors button.active { border-color: #fff; transform: scale(1.15); }
  .send {
    width: 100%; padding: 14px; font-size: 18px; font-weight: bold;
    background: #2563eb; color: #fff; border: none; border-radius: 12px;
    cursor: pointer; transition: background 0.15s;
  }
  .send:active { background: #1d4ed8; }
  .send:disabled { background: #374151; color: #6b7280; }
  .status { text-align: center; font-size: 13px; color: #6b7280; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">🐧</div>
    <h1>コメント投稿</h1>
    <p>画面にコメントが流れます</p>
  </div>
  <input id="text" type="text" placeholder="コメントを入力..." maxlength="50" autocomplete="off">
  <div class="colors" id="colors"></div>
  <button class="send" id="send">送信</button>
  <div class="status" id="status"></div>
</div>
<script>
const ENDPOINT = "https://n6w2jc2mb5avhkfdwhcr7zn72u.appsync-api.ap-northeast-1.amazonaws.com/graphql";
const API_KEY = "da2-ahlnpsbdwfhf7o63yamvxwdipi";

const COLORS = [
  {label:"白",value:"#FFFFFF"},{label:"赤",value:"#FF4444"},
  {label:"緑",value:"#44FF44"},{label:"青",value:"#4488FF"},
  {label:"黄",value:"#FFFF44"},{label:"ピンク",value:"#FF88CC"}
];
let selectedColor = "#FFFFFF";

const colorsEl = document.getElementById("colors");
COLORS.forEach(c => {
  const btn = document.createElement("button");
  btn.style.background = c.value;
  btn.title = c.label;
  if (c.value === selectedColor) btn.classList.add("active");
  btn.onclick = () => {
    selectedColor = c.value;
    colorsEl.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  };
  colorsEl.appendChild(btn);
});

const textEl = document.getElementById("text");
const sendBtn = document.getElementById("send");
const statusEl = document.getElementById("status");

async function send() {
  const text = textEl.value.trim();
  if (!text) return;
  sendBtn.disabled = true;
  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: {"Content-Type":"application/json","x-api-key":API_KEY},
      body: JSON.stringify({
        query: `mutation P($input:CommentInput!){publishComment(input:$input){id text color timestamp}}`,
        variables: {input: {
          id: crypto.randomUUID(),
          text: text,
          color: selectedColor,
          timestamp: new Date().toISOString()
        }}
      })
    });
    if (res.ok) { textEl.value = ""; statusEl.textContent = ""; }
    else { statusEl.textContent = "送信失敗"; }
  } catch(e) { statusEl.textContent = "通信エラー"; }
  sendBtn.disabled = false;
  textEl.focus();
}

sendBtn.onclick = send;
textEl.onkeydown = e => { if (e.key === "Enter") send(); };
</script>
</body>
</html>
